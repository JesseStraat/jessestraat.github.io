# ============================================================
# STEP 1: Your Identity (required)
# ============================================================
name: "Jesse Straat"
title: "Mathematics PhD candidate"
institution: "Vrije Universiteit Amsterdam"
email: j.r.h.[surname]&lt;at&gt;vu.nl
photo: jesse.jpeg  # place your photo in images/

# ============================================================
# STEP 2: Your Links (optional -- delete any you don't use)
# ============================================================
links:
  github: "https://github.com/JesseStraat"

# ============================================================
# STEP 3: Site Settings
# ============================================================
accent_color: "#00ddee"      # theme color for links and buttons
dark_mode: true              # show dark mode toggle in navbar
description: "Academic webpage of Jesse Straat"
url: "https://jessestraat.github.io"

# ============================================================
# STEP 4: Choose Your Pages (comment out any you don't need)
# ============================================================
nav_pages:
  - name: About
    location: about
  - name: Publications
    location: publications
  - name: Research
    location: research
  - name: Talks & conferences
    location: talks-conferences
  - name: LaTeX
    location: latex
  - name: Blog
    location: blog

# ============================================================
# Advanced Settings (you probably don't need to change these)
# ============================================================
include:
  - .htaccess
  - _pages

sass:
  quiet_deps: true
  style: compressed

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true

plugins: ["jekyll/scholar", "jekyll-sitemap"]

scholar:
  style: citesty
  locale: en
  source: /assets/
  bibliography: ref.bib
  bibliography_template: bibtemplate
  sort_by: year, month
  order: descending
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
  bibliography_list_attributes:
    reversed: "reversed"

exclude:
  - Gemfile
  - Gemfile.lock
  - update_bootstrap.sh
  - switch_theme.sh
  - tags
  - Rakefile
  - node_modules
  - package.json
  - package-lock.json
  - docs
